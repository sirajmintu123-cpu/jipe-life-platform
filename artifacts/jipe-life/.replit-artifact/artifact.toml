kind = "web"
previewPath = "/"
title = "Jipe Life"
version = "1.0.0"
id = "artifacts/jipe-life"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18116

[services.development]
run = "pnpm --filter @workspace/jipe-life run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jipe-life", "run", "build" ]
publicDir = "artifacts/jipe-life/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18116"
BASE_PATH = "/"

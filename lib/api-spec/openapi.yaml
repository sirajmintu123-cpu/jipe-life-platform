openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Jipe Life MLM Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: admin
    description: Admin operations
  - name: auth
    description: Authentication
  - name: binary
    description: Binary tree and matching engine
  - name: cto
    description: CTO royalty pool
  - name: epins
    description: E-Pin management
  - name: health
    description: Health operations
  - name: rewards
    description: Lifetime reward system
  - name: users
    description: User management
  - name: wallet
    description: Wallet and transactions

paths:
  # ── ADMIN ─────────────────────────────────────────────────────────────────
  /admin/binary/dashboard:
    get:
      operationId: getBinaryDashboard
      tags: [admin]
      summary: Get binary dashboard statistics
      responses:
        "200":
          description: Binary dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinaryDashboardResponse"

  /admin/binary/engine-status:
    get:
      operationId: getBinaryEngineStatus
      tags: [admin]
      summary: Get binary engine status
      responses:
        "200":
          description: Engine status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinaryEngineStatusResponse"

  /admin/cron/run-binary:
    post:
      operationId: adminRunBinaryMatching
      tags: [admin]
      summary: Manually trigger daily binary matching engine
      responses:
        "200":
          description: Matching complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronResult"


  /admin/cron/run-cto:
    post:
      operationId: adminRunCtoDistribution
      tags: [admin]
      summary: Manually trigger monthly CTO pool distribution
      responses:
        "200":
          description: Distribution complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CronResult"

  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard summary
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardStats"

  /admin/epins:
    get:
      operationId: adminListEpins
      tags: [admin]
      summary: List all E-Pins with filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: package
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Epin list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpinPage"

  /admin/epins/assign:
    post:
      operationId: adminAssignEpin
      tags: [admin]
      summary: Assign E-Pins to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpinAssignInput"
      responses:
        "200":
          description: Assigned

  /admin/epins/generate:
    post:
      operationId: adminGenerateEpins
      tags: [admin]
      summary: Bulk generate E-Pins for a package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpinGenerateInput"
      responses:
        "201":
          description: Generated pins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Epin"

  /admin/turnover:
    post:
      operationId: adminAddTurnover
      tags: [admin]
      summary: Record global monthly turnover (CTO input)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TurnoverInput"
      responses:
        "201":
          description: Recorded

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

  /admin/users/{userId}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get a specific user's details
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{userId}/status:
    patch:
      operationId: adminUpdateUserStatus
      tags: [admin]
      summary: Block or unblock a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStatusUpdate"
      responses:
        "200":
          description: Updated

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawal requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalPage"

  /admin/withdrawals/{withdrawalId}/approve:
    post:
      operationId: adminApproveWithdrawal
      tags: [admin]
      summary: Approve a withdrawal request
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved

  /admin/withdrawals/{withdrawalId}/reject:
    post:
      operationId: adminRejectWithdrawal
      tags: [admin]
      summary: Reject a withdrawal request
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectionInput"
      responses:
        "200":
          description: Rejected
          

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login with member ID and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user with E-Pin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/validate-epin:
    get:
      operationId: validateEpin
      tags: [auth]
      summary: Validate E-Pin and return package info
      parameters:
        - name: pin
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: E-Pin package info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpinValidation"
        "400":
          description: Invalid or used pin

  /auth/validate-sponsor:
    get:
      operationId: validateSponsor
      tags: [auth]
      summary: Validate sponsor ID and return sponsor name
      parameters:
        - name: sponsorId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sponsor info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SponsorInfo"
        "404":
          description: Sponsor not found

  # ── BINARY ENGINE ─────────────────────────────────────────────────────────
  /binary/history:
    get:
      operationId: getBinaryHistory
      tags: [binary]
      summary: Get pair matching history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Matching history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinaryHistoryPage"

  /binary/stats:
    get:
      operationId: getBinaryStats
      tags: [binary]
      summary: Get left/right BV, today's pairs, and capping info
      responses:
        "200":
          description: Binary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinaryStats"

  # ── CTO POOL ──────────────────────────────────────────────────────────────
  /cto/current:
    get:
      operationId: getCtoPoolStatus
      tags: [cto]
      summary: Get current month CTO pool amounts
      responses:
        "200":
          description: CTO pool status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtoPoolStatus"

  /cto/history:
    get:
      operationId: getCtoHistory
      tags: [cto]
      summary: Get user's CTO royalty payout history
      responses:
        "200":
          description: CTO history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CtoDistribution"

  /cto/recovery-status:
    get:
      operationId: getCtoRecoveryStatus
      tags: [cto]
      summary: Get 100% recovery status for user's package cost
      responses:
        "200":
          description: Recovery status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtoRecoveryStatus"

  /cto/member-summary:
    get:
      tags: [cto]
      operationId: getCtoMemberSummary
      responses:
        "200":
          description: Member CTO summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtoMemberSummary"                


  # ── E-PINS ────────────────────────────────────────────────────────────────
  /epins:
    get:
      operationId: listMyEpins
      tags: [epins]
      summary: List current user's E-Pins
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [unused, used, transferred]
      responses:
        "200":
          description: E-Pin list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Epin"

  /epins/history:
    get:
      operationId: getEpinHistory
      tags: [epins]
      summary: Get E-Pin transfer history
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EpinHistoryEntry"

  /epins/transfer:
    post:
      operationId: transferEpin
      tags: [epins]
      summary: Transfer an E-Pin to a downline member (OTP verified)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpinTransferInput"
      responses:
        "200":
          description: Transfer successful
        "400":
          description: Transfer failed

  # ── HEALTH ────────────────────────────────────────────────────────────────
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── REWARDS ───────────────────────────────────────────────────────────────
  /rewards:
    get:
      operationId: getRewards
      tags: [rewards]
      summary: Get user's lifetime reward progress
      responses:
        "200":
          description: Rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardProgress"

  /rewards/claim:
    post:
      operationId: claimReward
      tags: [rewards]
      summary: Claim a reward at a milestone (choose reward or cash)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewardClaimInput"
      responses:
        "200":
          description: Claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardClaim"

  # ── USERS ─────────────────────────────────────────────────────────────────
  /users/binary-tree:
    get:
      operationId: getBinaryTree
      tags: [users]
      summary: Get binary tree structure for current user
      parameters:
        - name: depth
          in: query
          schema:
            type: integer
            default: 3
      responses:
        "200":
          description: Binary tree nodes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinaryNode"
             

  /users/dashboard:
    get:
      operationId: getUserDashboard
      tags: [users]
      summary: Get dashboard stats for current user
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── WALLET ────────────────────────────────────────────────────────────────
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet balance and summary
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"

  /wallet/transactions:
    get:
      operationId: getTransactions
      tags: [wallet]
      summary: Get transaction history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionPage"

  /wallet/withdraw:
    post:
      operationId: requestWithdrawal
      tags: [wallet]
      summary: Submit a withdrawal request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalRequest"

  /wallet/withdrawals:
    get:
      operationId: getMyWithdrawals
      tags: [wallet]
      summary: Get user's withdrawal requests
      responses:
        "200":
          description: Withdrawal requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WithdrawalRequest"

components:
  schemas:
    AdminDashboardStats:
      type: object
      required: [totalMembers, activeMembers, todayRegistrations, totalTurnover, pendingWithdrawals, totalWithdrawals, adminFeeCollected, packageBreakdown]
      properties:
        totalMembers:
          type: integer
        activeMembers:
          type: integer
        todayRegistrations:
          type: integer
        totalTurnover:
          type: number
        pendingWithdrawals:
          type: integer
        totalWithdrawals:
          type: number
        adminFeeCollected:
          type: number
        packageBreakdown:
          $ref: "#/components/schemas/PackageBreakdown"
        recentRegistrations:
          type: array
          items:
            $ref: "#/components/schemas/User"

    AdminUserDetail:
      type: object
      required: [user, wallet, binaryStats, ctoStatus]
      properties:
        user:
          $ref: "#/components/schemas/User"
        wallet:
          $ref: "#/components/schemas/WalletInfo"
        binaryStats:
          $ref: "#/components/schemas/BinaryStats"
        ctoStatus:
          $ref: "#/components/schemas/CtoRecoveryStatus"

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    BinaryDashboardResponse:
      type: object
      properties:
        activeMembers:
          type: number
        todayPairs:
          type: number
        matchingIncome:
          type: number
        jackpotBonus:
          type: number
        netPayout:
          type: number
        membersWithPairs:
          type: number
        membersWithoutPairs:
          type: number
        membersNearJackpot:
          type: number
        rewardAchievements:
          type: number
        ctoStarter:
          type: number
        ctoSmart:
          type: number
        ctoSilver:
          type: number
        ctoGold:
          type: number

    BinaryEngineStatusResponse:
      type: object
      properties:
        status:
          type: string
        statusMessage:
          type: string
        lastRunDate:
          type: string
        lastRunTime:
          type: string
        nextScheduledRun:
          type: string

    BinaryHistoryEntry:
      type: object
      required: [id, date, pairsMatched, grossAmount, netAmount, isJackpot]
      properties:
        id:
          type: integer
        date:
          type: string
        pairsMatched:
          type: integer
        grossAmount:
          type: number
        netAmount:
          type: number
        isJackpot:
          type: boolean
        flushedPairs:
          type: integer

    BinaryHistoryPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/BinaryHistoryEntry"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    BinaryNode:
      type: object
      required: [id, memberId, name, package, bv, position]
      properties:
        id:
          type: integer
        memberId:
          type: string
        name:
          type: string
        package:
          type: string
        bv:
          type: integer
        position:
          type: string
          enum: [root, left, right]
        left:
          $ref: "#/components/schemas/BinaryNode"
        right:
          $ref: "#/components/schemas/BinaryNode"

    BinaryStats:
      type: object
      required: [leftBv, rightBv, todayPairs, todayEarning, isCapped, carryForwardBv, lifetimePairs]
      properties:
        leftBv:
          type: integer
        rightBv:
          type: integer
        todayPairs:
          type: integer
        todayEarning:
          type: number
        isCapped:
          type: boolean
        isJackpot:
          type: boolean
        carryForwardBv:
          type: integer
        lifetimePairs:
          type: integer

    CronResult:
      type: object
      required: [success, message, processedCount]
      properties:
        success:
          type: boolean
        message:
          type: string
        processedCount:
          type: integer

    CtoDistribution:
      type: object
      required: [id, month, year, amount, package, cumulativeReceived, isTerminated]
      properties:
        id:
          type: integer
        month:
          type: integer
        year:
          type: integer
        amount:
          type: number
        package:
          type: string
        cumulativeReceived:
          type: number
        isTerminated:
          type: boolean

    CtoPoolStatus:
      type: object
      required: [month, year, totalTurnover, smartPool, silverPool, goldPool, smartPerShare, silverPerShare, goldPerShare]
      properties:
        month:
          type: integer
        year:
          type: integer
        totalTurnover:
          type: number
        smartPool:
          type: number
        silverPool:
          type: number
        goldPool:
          type: number
        smartPerShare:
          type: number
        silverPerShare:
          type: number
        goldPerShare:
          type: number
        smartActiveUsers:
          type: integer
        silverActiveUsers:
          type: integer
        goldActiveUsers:
          type: integer

    CtoRecoveryStatus:
      type: object
      required: [packageCost, totalReceived, remainingForRecovery, recoveryPercent, isRecovered, ctoActive]
      properties:
        packageCost:
          type: integer
        totalReceived:
          type: number
        remainingForRecovery:
          type: number
        recoveryPercent:
          type: number
        isRecovered:
          type: boolean
        ctoActive:
          type: boolean

    CtoMemberSummary:
      type: object
      required:
        [
          package,
          packageCost,
          totalEarned,
          currentMonthIncome,
          remainingRecovery,
          recoveryPercent,
          ctoActive,
          month,
          year
        ]
      properties:
        package:
          type: string
        packageCost:
          type: integer
        totalEarned:
          type: number
        currentMonthIncome:
          type: number
        remainingRecovery:
          type: number
        recoveryPercent:
          type: number
        ctoActive:
          type: boolean
        month:
          type: integer
        year:
          type: integer
          

    DashboardStats:
      type: object
      required: [availableBalance, todayEarning, totalTeamSize, leftBv, rightBv, totalPairs, todayPairs, package, ctoActive, ctoEarned, packageCost]
      properties:
        availableBalance:
          type: number
        todayEarning:
          type: number
        totalTeamSize:
          type: integer
        leftBv:
          type: integer
        rightBv:
          type: integer
        totalPairs:
          type: integer
        todayPairs:
          type: integer
        package:
          type: string
        ctoActive:
          type: boolean
        ctoEarned:
          type: number
        packageCost:
          type: integer
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    Epin:
      type: object
      required: [id, pin, package, packagePrice, bv, status, createdAt]
      properties:
        id:
          type: integer
        pin:
          type: string
        package:
          type: string
          enum: [starter, smart, silver, gold]
        packagePrice:
          type: integer
        bv:
          type: integer
        status:
          type: string
          enum: [unused, used, transferred]
        assignedToId:
          type: ["integer", "null"]
        assignedToName:
          type: ["string", "null"]
        transferredToId:
          type: ["integer", "null"]
        createdAt:
          type: string
        usedAt:
          type: ["string", "null"]

    EpinAssignInput:
      type: object
      required: [pinIds, userId]
      properties:
        pinIds:
          type: array
          items:
            type: integer
        userId:
          type: integer

    EpinGenerateInput:
      type: object
      required: [package, quantity]
      properties:
        package:
          type: string
          enum: [starter, smart, silver, gold]
        quantity:
          type: integer

    EpinHistoryEntry:
      type: object
      required: [id, pin, package, action, date]
      properties:
        id:
          type: integer
        pin:
          type: string
        package:
          type: string
